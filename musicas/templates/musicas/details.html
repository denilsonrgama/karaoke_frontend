<!-- details.html -->
{% extends "base.html" %}
{% block title %}🎵 Karaoke do Cowboy™ - Detalhes{% endblock %}

{% block content %}
<style>
/* ===== BASE ===== */
body {
    font-family: 'Georgia', serif;
    margin: 0;
    padding: 0;
    background: linear-gradient(180deg, #fff8f0, #fcd09b, #f4a261);
    animation: sunsetBG 30s ease-in-out infinite alternate;
}

@keyframes sunsetBG {
    from { background: linear-gradient(180deg, #fff8f0, #fcd09b, #f4a261); }
    to   { background: linear-gradient(180deg, #ffe8d6, #fbbf70, #f48c42); }
}

h1 {
    text-align: center;
    color: #8b4513;
    text-shadow: 1px 1px #ffd700;
    margin-bottom: 1.5rem;
}

/* ===== CARD ===== */
.musica-card {
    background: linear-gradient(135deg,#e0cda9,#c68642);
    border: 2px solid #8b4513;
    border-radius: 12px;
    padding: 1rem;
    margin-bottom: 1rem;
    position: relative;
    box-shadow: inset 0 0 8px rgba(0,0,0,.15);
}

.musica-icon {
    position: absolute;
    top: 8px;
    right: 12px;
    font-size: 1.5rem;
    color: gold;
}

.musica-codigo { font-weight: bold; color: #5a2d0c; }
.musica-nome { font-size: 1.4rem; font-weight: bold; }
.musica-artista { color: #4b2e1b; }

/* ===== VIDEO ===== */
.video-container {
    background: black;
    border-radius: 12px;
    overflow: hidden;
    border: 3px solid #8b4513;
    margin-bottom: 1rem;
}

video {
    width: 100%;
    height: auto;
    background: black;
}

/* ===== LETRA ===== */
pre.letra {
    background: #fff8dc;
    padding: .6rem;
    border-radius: 8px;
    font-size: .9rem;
    white-space: pre-wrap;
    max-height: 200px;
    overflow-y: auto;
}

/* ===== BOTÕES ===== */
.btn-back {
    background-color: #d2691e;
    border-color: #8b4513;
    color: white;
}

.btn-back:hover {
    background-color: #8b4513;
}

.btn-palco {
    width: 100%;
    margin-bottom: 1rem;
    background-color: #8b4513;
    border: 2px solid #ffd700;
    color: #ffd700;
    font-weight: bold;
    border-radius: 12px;
    padding: 10px;
}

.tone-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    background: rgba(255, 248, 220, .9);
    border: 2px solid #8b4513;
    border-radius: 12px;
    padding: 10px;
    margin-bottom: 1rem;
}

.tone-controls button {
    min-width: 88px;
    border: 0;
    border-radius: 8px;
    padding: 9px 12px;
    background: #8b4513;
    color: #ffd700;
    font-weight: bold;
    cursor: pointer;
}

.tone-controls button:hover,
.tone-controls button.active {
    background: #5a2d0c;
}

.tone-label {
    min-width: 120px;
    text-align: center;
    color: #5a2d0c;
    font-weight: bold;
}

/* ===== DESKTOP MODO PALCO ===== */
@media (min-width: 768px) {
    body.palco {
        background: black;
    }

    body.palco h1,
    body.palco .musica-card,
    body.palco .btn-back,
    body.palco .btn-palco,
    body.palco .tone-controls {
        display: none;
    }

    body.palco pre.letra {
        background: black;
        color: #ffd700;
        font-size: 1.2rem;
    }

    body.palco video {
        width: 100vw;
        height: 100vh;
    }
}
</style>

<div class="mt-4 mb-5">
    <h1>🎵 Karaoke do Cowboy™</h1>

    <div class="musica-card">
        <div class="musica-icon">🎵</div>
        <div class="musica-codigo">Código: {{ musica.codigo }}</div>
        <div class="musica-nome">{{ musica.nome }}</div>
        <div class="musica-artista">{{ musica.artista }}</div>
    </div>

    <button id="palcoBtn" class="btn-palco">🎤 Modo Palco</button>

    <div class="video-container">
        <video id="video"
               data-codigo="{{ musica.codigo }}"
               data-play-url="{% url 'registrar_play' musica.codigo %}"
               data-original-src="{% url 'stream_video' musica.codigo %}?token={{ token }}"
               data-tone-src="{% url 'stream_video_tom' musica.codigo 'TONE' %}?token={{ token }}"
               data-tone-prepare-src="{% url 'prepare_video_tom' musica.codigo 'TONE' %}?token={{ token }}"
               controls playsinline preload="metadata"
               controlsList="nodownload noplaybackrate"
               oncontextmenu="return false">
            <source src="{% url 'stream_video' musica.codigo %}?token={{ token }}" type="video/mp4">
        </video>
    </div>

    <div class="tone-controls" aria-label="Controle de tom">
        <button type="button" class="tone-btn" data-tone="-2">-2</button>
        <button type="button" class="tone-btn" data-tone="-1">-1</button>
        <button type="button" class="tone-btn active" data-tone="0">Original</button>
        <button type="button" class="tone-btn" data-tone="1">+1</button>
        <button type="button" class="tone-btn" data-tone="2">+2</button>
        <span id="toneLabel" class="tone-label">Tom original</span>
    </div>

    {% if musica.letra %}
        <pre class="letra">{{ musica.letra }}</pre>
    {% endif %}

    <a href="{{ next_url }}" class="btn btn-back mt-3">
        ⬅ Voltar à Lista
    </a>
</div>

<script>
const palcoBtn = document.getElementById("palcoBtn");
const video = document.getElementById("video");
const toneButtons = document.querySelectorAll(".tone-btn");
const toneLabel = document.getElementById("toneLabel");
const isMobile = window.innerWidth < 768;

let playCounted = false;
let currentTone = 0;
let isPreparingTone = false;
const toneStorageKey = `karaokeTone:${video.dataset.codigo}`;

function toneUrl(tone) {
  if (tone === 0) {
    return video.dataset.originalSrc;
  }
  return video.dataset.toneSrc.replace("TONE", String(tone));
}

function prepareToneUrl(tone) {
  return video.dataset.tonePrepareSrc.replace("TONE", String(tone));
}

function renderTone(tone) {
  toneButtons.forEach((button) => {
    button.classList.toggle("active", Number(button.dataset.tone) === tone);
  });

  if (tone === 0) {
    toneLabel.textContent = "Tom original";
    return;
  }

  const signal = tone > 0 ? "+" : "";
  toneLabel.textContent = `${signal}${tone} tom${Math.abs(tone) === 1 ? "" : "s"}`;
}

async function applyTone(tone, autoplay = false) {
  if (tone === currentTone || isPreparingTone) {
    renderTone(tone);
    return;
  }

  const previousTime = video.currentTime || 0;
  isPreparingTone = true;
  toneButtons.forEach((button) => { button.disabled = true; });
  toneLabel.textContent = tone === 0 ? "Voltando..." : `Preparando ${tone > 0 ? "+" : ""}${tone}...`;

  let nextSrc = toneUrl(tone);
  if (tone !== 0) {
    try {
      const response = await fetch(prepareToneUrl(tone), { credentials: "same-origin" });
      const contentType = response.headers.get("content-type") || "";
      if (!contentType.includes("application/json")) {
        throw new Error("Sessao expirada. Recarregue a pagina.");
      }
      const data = await response.json();
      if (!response.ok || !data.ok || !data.url) {
        throw new Error(data.error || "Falha ao preparar tom");
      }
      nextSrc = data.url;
    } catch (error) {
      console.error("[tom] erro:", error);
      renderTone(currentTone);
      toneLabel.textContent = error.message || "Erro ao preparar tom";
      isPreparingTone = false;
      toneButtons.forEach((button) => { button.disabled = false; });
      return;
    }
  }

  if (video.currentSrc.endsWith(nextSrc) || video.src.endsWith(nextSrc)) {
    currentTone = tone;
    localStorage.setItem(toneStorageKey, String(tone));
    renderTone(tone);
    isPreparingTone = false;
    toneButtons.forEach((button) => { button.disabled = false; });
    return;
  }

  video.src = nextSrc;
  video.load();
  video.addEventListener("loadedmetadata", () => {
    if (previousTime > 0 && previousTime < video.duration) {
      video.currentTime = previousTime;
    }
  }, { once: true });

  currentTone = tone;
  localStorage.setItem(toneStorageKey, String(tone));
  renderTone(tone);
  isPreparingTone = false;
  toneButtons.forEach((button) => { button.disabled = false; });

  if (autoplay) {
    video.play().catch(() => {});
  }
}

const savedTone = Number(localStorage.getItem(toneStorageKey) || 0);
if ([-2, -1, 0, 1, 2].includes(savedTone)) {
  applyTone(savedTone);
} else {
  renderTone(0);
}

toneButtons.forEach((button) => {
  button.addEventListener("click", () => {
    const nextTone = Number(button.dataset.tone);
    applyTone(nextTone, !video.paused);
  });
});

video.addEventListener("play", async () => {
  if (playCounted) return;

  try {
    const r = await fetch(video.dataset.playUrl, {
      method: "POST",
      credentials: "same-origin",
    });

    let data = null;
    try { data = await r.json(); } catch(e) {}

    if (r.ok && data && data.ok) {
      playCounted = true;
    } else {
      console.error("[registrar_play] não contou");
    }
  } catch (e) {
    console.error("[registrar_play] erro:", e);
  }
}, { once: true });

palcoBtn.addEventListener("click", async () => {
    if (isMobile) {
        video.play();
        return;
    }

    document.body.classList.add("palco");

    try { await video.requestFullscreen(); } catch (e) {}
    video.play();
});

document.addEventListener("fullscreenchange", () => {
    if (!document.fullscreenElement) {
        document.body.classList.remove("palco");
    }
});
</script>
{% endblock %}
