<!-- palco.html -->


{% block title %}Modo Palco{% endblock %}

{% block content %}
<style>
    body {
        margin: 0;
        background: black;
        color: white;
        overflow: hidden;
    }

    .palco-wrap {
        position: fixed;
        inset: 0;
        background: black;
        z-index: 9999;
    }

    .video-lock {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,.45);
        color: #ffd700;
        font-weight: bold;
        text-align: center;
        pointer-events: auto;
    }

    .video-lock.active {
        display: flex;
    }

    video {
        width: 100vw;
        height: 100vh;
        object-fit: contain;
        background: black;
    }

    .voltar {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 10000;
        padding: 10px 14px;
        background: rgba(0,0,0,0.6);
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
    }

    .tone-controls {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 10000;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px;
        background: rgba(0,0,0,0.6);
        border-radius: 8px;
    }

    .tone-controls button {
        padding: 8px 10px;
        background: #8b4513;
        color: #ffd700;
        border: 1px solid #ffd700;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
    }

    .tone-controls button.active {
        background: #5a2d0c;
    }

    .tone-label {
        min-width: 96px;
        text-align: center;
        color: #ffd700;
        font-weight: bold;
        font-size: 14px;
    }

    .tone-progress {
        display: none;
        width: 180px;
        height: 10px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255,255,255,0.25);
        border: 1px solid #ffd700;
    }

    .tone-progress.active {
        display: block;
    }

    .tone-progress-bar {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #198754, #ffd700);
        transition: width .35s ease;
    }

    .tone-cancel {
        display: none;
    }

    .tone-cancel.active {
        display: inline-block;
        background: #b02a37;
        color: #fff;
    }

</style>

<button class="voltar" id="voltarBtn">⬅ Voltar</button>

<div class="tone-controls" aria-label="Controle de tom">
    <button type="button" class="tone-btn" data-tone="-2">-2</button>
    <button type="button" class="tone-btn" data-tone="-1">-1</button>
    <button type="button" class="tone-btn active" data-tone="0">Original</button>
    <button type="button" class="tone-btn" data-tone="1">+1</button>
    <button type="button" class="tone-btn" data-tone="2">+2</button>
    <span id="toneLabel" class="tone-label">Tom original</span>
    <div id="toneProgress" class="tone-progress" aria-hidden="true">
        <div id="toneProgressBar" class="tone-progress-bar"></div>
    </div>
    <button type="button" id="toneCancel" class="tone-cancel">Cancelar</button>
</div>

<div class="palco-wrap">
    <video
        id="video"
        data-codigo="{{ musica.codigo }}"
        data-play-url="{% url 'registrar_play' musica.codigo %}"
        data-original-src="{% url 'stream_video' musica.codigo %}?token={{ token }}"
        data-tone-src="{% url 'stream_video_tom' musica.codigo 'TONE' %}?token={{ token }}"
        data-tone-prepare-src="{% url 'prepare_video_tom' musica.codigo 'TONE' %}?token={{ token }}"
        controls
        controlsList="nodownload noplaybackrate"
        oncontextmenu="return false;"
        autoplay
        playsinline
        webkit-playsinline
        preload="auto"
        src="{% url 'stream_video' musica.codigo %}?token={{ token }}"
    >
        Seu navegador não suporta vídeo.
    </video>
    <div id="videoLock" class="video-lock">Preparando tom...</div>
</div>

<script>
(function () {
    const video = document.getElementById("video");
    const voltarBtn = document.getElementById("voltarBtn");
    const toneButtons = document.querySelectorAll(".tone-btn");
    const toneLabel = document.getElementById("toneLabel");
    const toneProgress = document.getElementById("toneProgress");
    const toneProgressBar = document.getElementById("toneProgressBar");
    const toneCancel = document.getElementById("toneCancel");
    const videoLock = document.getElementById("videoLock");
    const toneStorageKey = `karaokeTone:${video.dataset.codigo}`;
    let currentTone = 0;
    let isPreparingTone = false;
    let cancelToneRequest = false;
    const preparedToneUrls = {};

    function toneUrl(tone) {
        if (tone === 0) {
            return video.dataset.originalSrc;
        }
        return video.dataset.toneSrc.replace("TONE", String(tone));
    }

    function prepareToneUrl(tone) {
        return video.dataset.tonePrepareSrc.replace("TONE", String(tone));
    }

    function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function setToneProgress(percent) {
        toneProgress.classList.toggle("active", percent > 0 && percent < 100);
        toneProgressBar.style.width = `${Math.max(0, Math.min(100, percent))}%`;
    }

    function setToneControlsPreparing(preparing) {
        isPreparingTone = preparing;
        toneButtons.forEach((button) => { button.disabled = preparing; });
        toneCancel.classList.toggle("active", preparing);
        videoLock.classList.toggle("active", preparing);
        if (preparing) {
            video.removeAttribute("controls");
        } else {
            video.setAttribute("controls", "");
        }
    }

    async function waitForPreparedTone(tone) {
        for (let attempt = 0; attempt < 90; attempt += 1) {
            if (cancelToneRequest) {
                throw new Error("cancelado");
            }

            setToneProgress(Math.min(95, 8 + attempt * 3));
            const response = await fetch(prepareToneUrl(tone), { credentials: "same-origin" });
            const contentType = response.headers.get("content-type") || "";
            if (!contentType.includes("application/json")) {
                throw new Error("Sessao expirada. Recarregue a pagina.");
            }

            const data = await response.json();
            if (!response.ok || data.ok === false) {
                throw new Error(data.error || "Falha ao preparar tom");
            }
            if (data.status === "ready" && data.url) {
                setToneProgress(100);
                return data.url;
            }

            toneLabel.textContent = `Preparando ${tone > 0 ? "+" : ""}${tone}...`;
            await sleep(3000);
        }

        throw new Error("Preparacao demorou demais. Tente novamente.");
    }

    function renderTone(tone) {
        toneButtons.forEach((button) => {
            button.classList.toggle("active", Number(button.dataset.tone) === tone);
        });

        if (tone === 0) {
            toneLabel.textContent = "Tom original";
            return;
        }

        const signal = tone > 0 ? "+" : "";
        toneLabel.textContent = `${signal}${tone} tom${Math.abs(tone) === 1 ? "" : "s"}`;
    }

    async function applyTone(tone, autoplay = false) {
        if (tone === currentTone || isPreparingTone) {
            renderTone(tone);
            return;
        }

        video.pause();
        video.currentTime = 0;
        cancelToneRequest = false;
        setToneControlsPreparing(true);
        setToneProgress(tone === 0 ? 0 : 5);
        toneLabel.textContent = tone === 0 ? "Voltando..." : `Preparando ${tone > 0 ? "+" : ""}${tone}...`;

        let nextSrc = preparedToneUrls[tone] || toneUrl(tone);
        if (tone !== 0) {
            if (!preparedToneUrls[tone]) {
                try {
                    nextSrc = await waitForPreparedTone(tone);
                    preparedToneUrls[tone] = nextSrc;
                } catch (error) {
                    if (error.message === "cancelado") {
                        video.src = video.dataset.originalSrc;
                        video.load();
                        currentTone = 0;
                        localStorage.removeItem(toneStorageKey);
                        renderTone(0);
                        toneLabel.textContent = "Tom original";
                        setToneProgress(0);
                        setToneControlsPreparing(false);
                        return;
                    }
                    console.error("[tom] erro:", error);
                    renderTone(currentTone);
                    toneLabel.textContent = error.message || "Erro ao preparar tom";
                    setToneProgress(0);
                    setToneControlsPreparing(false);
                    return;
                }
            }

        }

        if (video.currentSrc.endsWith(nextSrc) || video.src.endsWith(nextSrc)) {
            currentTone = tone;
            localStorage.setItem(toneStorageKey, String(tone));
            renderTone(tone);
            setToneProgress(0);
            setToneControlsPreparing(false);
            return;
        }

        video.src = nextSrc;
        video.load();

        currentTone = tone;
        localStorage.setItem(toneStorageKey, String(tone));
        renderTone(tone);
        toneLabel.textContent = tone === 0
            ? "Tom original em execucao"
            : `Alteracao para ${tone > 0 ? "+" : ""}${tone} tom em execucao`;
        setToneProgress(0);
        setToneControlsPreparing(false);

        if (autoplay) {
            video.play().catch(() => {});
        }
    }

    localStorage.removeItem(toneStorageKey);
    renderTone(0);

    toneButtons.forEach((button) => {
        button.addEventListener("click", () => {
            applyTone(Number(button.dataset.tone), !video.paused);
        });
    });

    toneCancel.addEventListener("click", () => {
        cancelToneRequest = true;
        video.pause();
        video.src = video.dataset.originalSrc;
        video.load();
        currentTone = 0;
        localStorage.removeItem(toneStorageKey);
        renderTone(0);
        toneLabel.textContent = "Tom original";
        setToneProgress(0);
        setToneControlsPreparing(false);
    });

    const voltarUrl = "{{ voltar_url|default:'' }}";
    voltarBtn.addEventListener("click", () => {
        if (voltarUrl) {
            window.location.href = voltarUrl;
        } else {
            window.location.href = "{% url 'detalhe_musica' musica.codigo %}";
        }
    });

    let playCounted = false;
    video.addEventListener("play", async () => {
        if (isPreparingTone) {
            video.pause();
            return;
        }

        if (playCounted) return;

        try {
            const r = await fetch(video.dataset.playUrl, {
                method: "POST",
                credentials: "same-origin",
            });

            let data = null;
            try { data = await r.json(); } catch(e) {}

            if (data && data.requires_release) {
                video.pause();
                alert(data.message || "Acesso aguardando liberacao.");
            } else if (r.ok && data && data.ok) {
                playCounted = true;
            }
        } catch (e) {}
    });

    video.addEventListener("ended", async () => {
        if (document.fullscreenElement) {
            try { await document.exitFullscreen(); } catch (e) {}
        }

        if (voltarUrl) {
            window.location.href = voltarUrl;
        } else {
            window.location.href = "{% url 'lista_musicas' %}";
        }
    });

    document.addEventListener("click", function () {
        if (video && video.paused) {
            video.play().catch(() => {});
        }
    }, { passive: true });
})();
</script>
{% endblock %}
