{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karaoke do Cowboy - Bem-vindo</title>
  <style>
    :root {
      --saloon-black: #080706;
      --saloon-ink: #211306;
      --saloon-gold: #f3b23e;
      --saloon-amber: #f59b2e;
      --saloon-cream: #fff1d8;
      --saloon-red: #d83a3a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 15%, rgba(255, 221, 156, 0.5), transparent 28%),
        linear-gradient(135deg, #160a03 0%, #51290e 42%, #f59b2e 100%);
      color: var(--saloon-cream);
      font-family: Georgia, "Times New Roman", serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255, 255, 255, 0.8) 0 2px, transparent 2px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05), transparent 35%, rgba(0, 0, 0, 0.08));
      background-size: 120px 120px, 100% 100%;
      opacity: 0.42;
      pointer-events: none;
      animation: drift 10s linear infinite;
    }

    .welcome-stage {
      position: relative;
      width: min(760px, calc(100vw - 32px));
      min-height: 430px;
      display: grid;
      align-content: center;
      justify-items: center;
      padding: clamp(32px, 7vw, 72px);
      border: 1px solid rgba(255, 226, 170, 0.22);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(0, 0, 0, 0.9), rgba(47, 23, 8, 0.92)),
        radial-gradient(circle at top, rgba(243, 178, 62, 0.15), transparent 45%);
      box-shadow: 0 28px 80px rgba(24, 10, 0, 0.42);
      text-align: center;
    }

    .mark {
      width: 96px;
      height: 96px;
      display: grid;
      place-items: center;
      margin-bottom: 24px;
      border: 2px solid rgba(243, 178, 62, 0.65);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 218, 142, 0.12), rgba(0, 0, 0, 0.42));
      box-shadow: inset 0 0 28px rgba(243, 178, 62, 0.12);
      animation: pulse 1.8s ease-in-out infinite;
    }

    .mark img {
      width: 78%;
      height: 78%;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.45));
    }

    .welcome-version {
      display: inline-flex;
      align-items: center;
      min-height: 18px;
      margin: -8px 0 22px;
      padding: 2px 7px;
      border: 1px solid rgba(243, 178, 62, 0.42);
      border-radius: 999px;
      background: rgba(243, 178, 62, 0.12);
      color: var(--saloon-gold);
      font-family: Arial, sans-serif;
      font-size: 0.75rem;
      font-weight: 900;
      line-height: 1;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 7vw, 4.5rem);
      line-height: 1;
      color: #fff8ec;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.55);
    }

    .subtitle {
      max-width: 560px;
      margin: 18px 0 34px;
      color: rgba(255, 241, 216, 0.82);
      font-size: clamp(1.05rem, 3vw, 1.35rem);
      line-height: 1.45;
    }

    .progress-wrap {
      width: min(460px, 100%);
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 10px;
      color: rgba(255, 241, 216, 0.72);
      font-size: 0.95rem;
      font-family: Arial, sans-serif;
      letter-spacing: 0;
    }

    .progress-track {
      height: 14px;
      overflow: hidden;
      border: 1px solid rgba(255, 226, 170, 0.35);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.34);
    }

    .progress-bar {
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--saloon-red), var(--saloon-gold), #fff1a6);
      animation: load 10s cubic-bezier(.18, .72, .18, 1) forwards;
      box-shadow: 0 0 24px rgba(243, 178, 62, 0.55);
    }

    @keyframes load {
      0% { width: 0; }
      28% { width: 34%; }
      55% { width: 62%; }
      82% { width: 86%; }
      100% { width: 100%; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes drift {
      from { background-position: 0 0, 0 0; }
      to { background-position: 120px 120px, 0 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      body::before,
      .mark,
      .progress-bar {
        animation: none;
      }

      .progress-bar {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="welcome-stage" aria-live="polite">
    <div class="mark" aria-hidden="true">
      <img src="{% static 'musicas/brand/brand-mark-candidate.png' %}" alt="">
    </div>
    <span class="welcome-version">{{ APP_VERSION }}</span>
    <h1>Bem-vindo, {{ display_name }}.</h1>
    <p class="subtitle">Luzes acesas. Microfone pronto. Preparando seu palco...</p>

    <div class="progress-wrap" role="status">
      <div class="progress-label">
        <span>Aquecendo a banda</span>
        <span>Entrando...</span>
      </div>
      <div class="progress-track" aria-hidden="true">
        <div class="progress-bar"></div>
      </div>
    </div>
  </main>

  <script>
    window.setTimeout(function () {
      window.location.href = "{{ next_url|escapejs }}";
    }, 10200);
  </script>
</body>
</html>
