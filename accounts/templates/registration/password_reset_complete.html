<!DOCTYPE html>
{% load static %}
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karaoke do Cowboy - Senha atualizada</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  body {
    min-height: 100vh;
    margin: 0;
    background: #f6f0e7;
    color: #2a2118;
    font-family: Arial, Helvetica, sans-serif;
  }

  .auth-shell {
    display: grid;
    grid-template-columns: minmax(280px, .85fr) minmax(320px, 1fr);
    min-height: 100vh;
  }

  .auth-brand {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 34px;
    background:
      radial-gradient(circle at 18% 18%, rgba(246,195,67,.22), transparent 26%),
      linear-gradient(145deg, #070708 0%, #15100b 48%, #3b260f 100%);
    color: #fff;
    border-right: 1px solid rgba(246,195,67,.28);
  }

  .brand-logo {
    display: grid;
    place-items: center;
    width: 108px;
    height: 108px;
    border: 1px solid rgba(246,195,67,.58);
    border-radius: 999px;
    background: rgba(0,0,0,.24);
    box-shadow: 0 18px 42px rgba(0,0,0,.32), 0 0 0 6px rgba(246,195,67,.08);
    overflow: hidden;
  }

  .brand-logo img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .brand-copy h1 {
    margin: 26px 0 10px;
    color: #f6c343;
    font-size: clamp(2rem, 4vw, 3.2rem);
    font-weight: 900;
    line-height: 1;
  }

  .brand-copy p {
    max-width: 430px;
    margin: 0;
    color: rgba(255,255,255,.84);
    font-size: 1.05rem;
    font-weight: 700;
  }

  .auth-area {
    display: grid;
    align-items: center;
    padding: 34px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.7), rgba(255,255,255,.35)),
      #f6f0e7;
  }

  .auth-card {
    width: min(100%, 460px);
    margin: 0 auto;
    padding: 26px;
    border: 1px solid rgba(95,65,24,.18);
    border-radius: 8px;
    background: #fff;
    box-shadow: 0 18px 42px rgba(66,43,14,.14);
    text-align: center;
  }

  .auth-card h2 {
    margin: 0;
    color: #24180d;
    font-size: 1.55rem;
    font-weight: 900;
  }

  .auth-card p {
    margin: 12px 0 0;
    color: #7c6f61;
    font-weight: 700;
  }

  .btn-primary {
    border-color: #8f5f12;
    background: #8f5f12;
  }

  .btn-primary:hover,
  .btn-primary:focus {
    border-color: #6f4709;
    background: #6f4709;
  }

  @media (max-width: 820px) {
    .auth-shell {
      grid-template-columns: 1fr;
    }

    .auth-brand,
    .auth-area {
      padding: 22px;
    }
  }
</style>
</head>

<body>
<main class="auth-shell">
  <section class="auth-brand">
    <div>
      <div class="brand-logo">
        <img src="{% static 'musicas/brand/brand-mark-candidate.png' %}" alt="Karaoke do Cowboy">
      </div>
      <div class="brand-copy">
        <h1>Senha atualizada</h1>
        <p>Sua conta esta pronta para entrar novamente.</p>
      </div>
    </div>
  </section>

  <section class="auth-area">
    <div class="auth-card">
      <h2>Tudo certo</h2>
      <p>Sua senha foi redefinida com sucesso. Agora e so entrar no saloon.</p>
      <a class="btn btn-primary btn-lg fw-bold mt-4" href="{% url 'login' %}">Ir para o login</a>
    </div>
  </section>
</main>
</body>
</html>
